<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: http: data: blob:; script-src 'self' 'unsafe-inline'; media-src * blob:; connect-src 'self' ws: wss:;">
  <title>Kiosk Client</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    body { font-family: system-ui, sans-serif; background: #0a0a0f; color: #e0e0e0; }

    /* Waiting: full viewport, dark, centered */
    #waiting {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #0a0a0f 0%, #12121a 100%);
      text-align: center;
      padding: 2rem;
    }
    #waiting.hidden { display: none; }

    #waiting .title { font-size: 1.25rem; font-weight: 600; color: #71717a; margin-bottom: 2rem; }
    #waiting .status-line { font-size: 0.95rem; margin-top: 1rem; }
    #waiting .status-line.connected { color: #22c55e; }
    #waiting .status-line.disconnected { color: #94a3b8; }

    .waiting-dots {
      display: inline-flex;
      gap: 6px;
      margin-top: 1.5rem;
    }
    .waiting-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3f3f46;
      animation: waiting-bounce 1.4s ease-in-out infinite both;
    }
    .waiting-dots span:nth-child(1) { animation-delay: -0.32s; }
    .waiting-dots span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes waiting-bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Browser: only webview, full screen, no chrome */
    #browser-container {
      display: none;
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
    }
    #browser-container.visible {
      display: block;
    }
    #browser-container webview {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div id="waiting">
    <div class="title">Kiosk Client</div>
    <p class="status-line disconnected" id="status">Подключение к серверу…</p>
    <div class="waiting-dots" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>
  </div>
  <div id="browser-container">
    <webview id="webview" allowpopups="no"></webview>
  </div>
  <script type="module" src="renderer.js"></script>
</body>
</html>
