services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      - AUTH_TOKEN=${AUTH_TOKEN:-your-secret-token}
      - HOST=0.0.0.0
      - PORT=8000

  monitor:
    build:
      context: ./monitor
      args:
        VITE_API_URL: http://localhost:8000
        VITE_WS_URL: ws://localhost:8000/ws/monitor
        VITE_AUTH_TOKEN: ${AUTH_TOKEN:-your-secret-token}
    ports:
      - "3000:80"
    depends_on:
      - backend
