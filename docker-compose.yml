services:
  kiosk-backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      - AUTH_TOKEN=${AUTH_TOKEN:-your-secret-token}
      - HOST=0.0.0.0
      - PORT=8000
    networks:
      applyz-network:
        aliases:
          - kiosk-backend

  kiosk-monitor:
    build:
      context: ./monitor
      args:
        VITE_API_URL: https://profile.innopolis.university
        VITE_WS_URL: wss://profile.innopolis.university/kiosk-api/ws/monitor
        VITE_AUTH_TOKEN: ${AUTH_TOKEN:-your-secret-token}
    networks:
      applyz-network:
        aliases:
          - kiosk-monitor
    depends_on:
      - backend

networks:
  applyz-network:
    external: true
    name: applyz_default